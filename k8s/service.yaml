apiVersion: v1
kind: Service
metadata:
  name: docling-graph-service
  labels:
    app: docling-graph
spec:
  type: LoadBalancer
  selector:
    app: docling-graph
    component: web
  ports:
  - name: http
    port: 80
    targetPort: 7860
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

