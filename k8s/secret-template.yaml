# Template for creating secrets
# Copy this file to secret.yaml and fill in your actual API keys
# DO NOT commit secret.yaml to git!

apiVersion: v1
kind: Secret
metadata:
  name: llm-api-keys
  labels:
    app: docling-graph
type: Opaque
stringData:
  # Mistral AI API Key
  mistral-api-key: "YOUR_MISTRAL_API_KEY_HERE"
  
  # OpenAI API Key
  openai-api-key: "YOUR_OPENAI_API_KEY_HERE"
  
  # Google Gemini API Key
  gemini-api-key: "YOUR_GEMINI_API_KEY_HERE"
  
  # IBM WatsonX credentials
  watsonx-api-key: "YOUR_WATSONX_API_KEY_HERE"
  watsonx-project-id: "YOUR_WATSONX_PROJECT_ID_HERE"
  watsonx-url: "YOUR_WATSONX_URL_HERE"

---
# Instructions:
# 1. Copy this file: cp secret-template.yaml secret.yaml
# 2. Edit secret.yaml and replace YOUR_*_HERE with actual values
# 3. Apply: kubectl apply -f secret.yaml
# 4. Add secret.yaml to .gitignore

