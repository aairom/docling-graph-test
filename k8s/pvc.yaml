apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: docling-graph-input-pvc
  labels:
    app: docling-graph
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: docling-graph-output-pvc
  labels:
    app: docling-graph
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard

